<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#EEF1EC">
<title>Mark your day — SNT Field Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="mast">
  <div class="brand">
    <div class="logo">SNT</div>
    <div class="tt">
      <span class="co">Shree Narayani Traders</span>
      <h1>Field Board</h1>
    </div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:7px">
    <div class="date" id="mastDate"></div>
    <a class="pill" href="dashboard.html">▦&nbsp; Live board</a>
  </div>
</header>

<main class="wrap">

  <!-- receipt shown after a successful mark -->
  <section class="receipt" id="receipt" hidden>
    <div class="rok"><span class="check">✓</span><h2 id="receiptTitle">Marked for today</h2></div>
    <dl>
      <dt>Name</dt><dd id="rName"></dd>
      <dt>Status</dt><dd id="rStatus"></dd>
      <dt id="rLocLabel">Where</dt><dd id="rLoc"></dd>
      <dt>Time</dt><dd id="rTime"></dd>
    </dl>
    <button class="linkbtn" id="editBtn">Change today's entry</button>
  </section>

  <form id="form">
    <div class="step">
      <label class="eyebrow" for="mr">Who is marking</label>
      <select id="mr" required>
        <option value="">Select your name…</option>
      </select>
    </div>

    <div class="step" id="stepStatus" hidden>
      <span class="eyebrow">Today I am</span>
      <div class="statuses" id="statuses"></div>
    </div>

    <div class="step" id="stepWhere" hidden>
      <span class="eyebrow">Zones <span class="req">— pick one or more</span></span>
      <div class="chips" id="zoneChips"></div>

      <span class="eyebrow" style="margin-top:18px">Towns / areas <span class="req">— pick all you'll cover</span></span>
      <div id="townWrap"></div>

      <label class="eyebrow" for="note" style="margin-top:18px">Note (optional)</label>
      <input type="text" id="note" maxlength="60" placeholder="e.g. with ASM, chemist meet">
    </div>

    <div class="submit" id="stepSubmit" hidden>
      <button type="submit" id="go">Mark my day</button>
      <p class="msg" id="msg"></p>
    </div>
  </form>

  <a class="boardlink" href="dashboard.html">
    <div class="bl-txt">
      <strong>See who's in the field</strong>
      <span>Live board — who is working in which town today</span>
    </div>
    <span class="bl-go">→</span>
  </a>
</main>

<script src="data.js"></script>
<script>
(async function () {
  const $ = (id) => document.getElementById(id);
  const state = { mrId: "", status: "", zones: [], cities: [] };
  const KEY_ME = "snt_fb_me";
  const KEY_DONE = "snt_fb_done";

  $("mastDate").textContent = prettyDateIST();

  const esc = (s) => String(s == null ? "" : s).replace(/[&<>"]/g, (c) =>
    ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

  /* ---- live MR list from the Master tab; built-in list if offline ---- */
  const mrSel = $("mr");
  mrSel.innerHTML = '<option value="">Loading names…</option>';
  mrSel.disabled = true;
  await loadMaster();
  mrSel.disabled = false;
  mrSel.innerHTML = '<option value="">Select your name…</option>';
  MRS.slice().sort((a, b) => a.name.localeCompare(b.name)).forEach((m) => {
    const o = document.createElement("option");
    o.value = m.id;
    o.textContent = m.name + " · " + m.division;
    mrSel.appendChild(o);
  });

  /* ---- status buttons ---- */
  const sBox = $("statuses");
  STATUSES.forEach((s) => {
    const b = document.createElement("button");
    b.type = "button";
    b.dataset.code = s.code;
    b.setAttribute("aria-pressed", "false");
    b.innerHTML = '<span class="dot"></span>' + s.label;
    b.addEventListener("click", () => pickStatus(s.code));
    sBox.appendChild(b);
  });

  /* ---- zone chips (multi-select) ---- */
  const zBox = $("zoneChips");
  ZONE_ORDER.forEach((z) => {
    const b = document.createElement("button");
    b.type = "button"; b.className = "chip"; b.dataset.zone = z;
    b.style.setProperty("--cc", "var(" + ZONE_KEY[z].var + ")");
    b.setAttribute("aria-pressed", "false");
    b.innerHTML = '<span class="tick"></span>' + esc(z);
    b.addEventListener("click", () => toggleZone(z, b));
    zBox.appendChild(b);
  });

  function toggleZone(z, btn) {
    const i = state.zones.indexOf(z);
    if (i >= 0) {
      state.zones.splice(i, 1);
      state.cities = state.cities.filter((c) => CITY_TO_ZONE[c] !== z);
      btn.setAttribute("aria-pressed", "false");
    } else {
      state.zones.push(z);
      btn.setAttribute("aria-pressed", "true");
    }
    renderTowns();
    refresh();
  }

  /* ---- town chips (multi-select), grouped by the chosen zones ---- */
  function renderTowns() {
    const wrap = $("townWrap");
    wrap.innerHTML = "";
    const picked = ZONE_ORDER.filter((z) => state.zones.includes(z));
    if (!picked.length) {
      wrap.innerHTML = '<p class="emptytowns">Pick a zone above to choose towns.</p>';
      return;
    }
    picked.forEach((z) => {
      const block = document.createElement("div");
      block.className = "townzone";
      block.style.setProperty("--cc", "var(" + ZONE_KEY[z].var + ")");
      const lbl = document.createElement("div");
      lbl.className = "zlabel"; lbl.textContent = z;
      block.appendChild(lbl);
      const chips = document.createElement("div");
      chips.className = "chips";
      ZONES[z].forEach((c) => {
        const b = document.createElement("button");
        b.type = "button"; b.className = "chip";
        b.style.setProperty("--cc", "var(" + ZONE_KEY[z].var + ")");
        b.setAttribute("aria-pressed", String(state.cities.includes(c)));
        b.innerHTML = '<span class="tick"></span>' + esc(c);
        b.addEventListener("click", () => toggleCity(c, b));
        chips.appendChild(b);
      });
      block.appendChild(chips);
      wrap.appendChild(block);
    });
  }

  function toggleCity(c, btn) {
    const i = state.cities.indexOf(c);
    if (i >= 0) { state.cities.splice(i, 1); btn.setAttribute("aria-pressed", "false"); }
    else { state.cities.push(c); btn.setAttribute("aria-pressed", "true"); }
    refresh();
  }

  mrSel.addEventListener("change", () => {
    state.mrId = mrSel.value;
    if (state.mrId) localStorage.setItem(KEY_ME, state.mrId);
    $("stepStatus").hidden = !state.mrId;
    refresh();
  });

  function pickStatus(code) {
    state.status = code;
    [...sBox.children].forEach((b) =>
      b.setAttribute("aria-pressed", String(b.dataset.code === code))
    );
    const needsPlace = STATUSES.find((s) => s.code === code).field;
    $("stepWhere").hidden = !needsPlace;
    if (needsPlace) {
      if (!$("townWrap").children.length) renderTowns();
    } else {
      state.zones = []; state.cities = [];
      [...zBox.children].forEach((b) => b.setAttribute("aria-pressed", "false"));
      renderTowns();
    }
    refresh();
  }

  function valid() {
    if (!state.mrId || !state.status) return false;
    const needsPlace = STATUSES.find((s) => s.code === state.status).field;
    return needsPlace ? state.cities.length > 0 : true;
  }
  function refresh() {
    $("stepSubmit").hidden = !state.status;
    $("go").disabled = !valid();
  }

  /* ---- submit ---- */
  $("form").addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!valid()) return;
    const btn = $("go"), msg = $("msg");
    btn.disabled = true;
    btn.textContent = "Sending…";
    msg.className = "msg";
    msg.textContent = "";

    const mr = MRS.find((m) => m.id === state.mrId);
    const zonesUsed = ZONE_ORDER.filter((z) => state.cities.some((c) => CITY_TO_ZONE[c] === z));
    const payload = {
      date: todayIST(),
      mrId: mr.id,
      mrName: mr.name,
      division: mr.division,
      status: state.status,
      zone: zonesUsed.join(", "),
      city: state.cities.join(", "),
      note: $("note").value.trim(),
    };

    try {
      // text/plain keeps this a "simple request" — no CORS preflight,
      // which Apps Script web apps cannot answer.
      const out = await apiFetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload),
      });
      if (!out.ok) throw new Error(out.error || "Server rejected the entry");

      localStorage.setItem(KEY_DONE, JSON.stringify({ ...payload, time: out.time }));
      showReceipt({ ...payload, time: out.time }, out.updated);
    } catch (err) {
      btn.disabled = false;
      btn.textContent = "Mark my day";
      msg.className = "msg err";
      msg.textContent = err.apiConfig
        ? err.message + "."
        : "Could not send — check your connection and press again. (" + err.message + ")";
    }
  });

  /* ---- receipt ---- */
  function showReceipt(d, updated) {
    const st = STATUSES.find((s) => s.code === d.status);
    $("receiptTitle").textContent = updated ? "Entry updated" : "Marked for today";
    $("rName").textContent = d.mrName + " · " + d.division;
    $("rStatus").textContent = st ? st.label : d.status;
    if (d.city) {
      $("rLocLabel").hidden = false; $("rLoc").hidden = false;
      $("rLoc").textContent = d.city + (d.zone ? "  ·  " + d.zone : "");
    } else {
      $("rLocLabel").hidden = true; $("rLoc").hidden = true;
    }
    $("rTime").textContent = d.time || "—";
    $("receipt").hidden = false;
    $("form").hidden = true;
    window.scrollTo(0, 0);
  }

  $("editBtn").addEventListener("click", () => {
    $("receipt").hidden = true;
    $("form").hidden = false;
    $("go").disabled = false;
    $("go").textContent = "Update my entry";
  });

  /* ---- restore ---- */
  const done = JSON.parse(localStorage.getItem(KEY_DONE) || "null");
  if (done && done.date === todayIST()) {
    showReceipt(done, false);
  }
  const me = localStorage.getItem(KEY_ME);
  if (me && MRS.some((m) => m.id === me)) {
    mrSel.value = me;
    mrSel.dispatchEvent(new Event("change"));
  }
})();
</script>
</body>
</html>
