<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#EEF1EC">
<title>Live Board — SNT Field Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="mast">
  <div class="brand">
    <div class="logo">SNT</div>
    <div class="tt">
      <span class="co">Shree Narayani Traders</span>
      <h1>Field Board <span>· who's where</span></h1>
    </div>
  </div>
  <a class="pill" href="index.html">＋&nbsp; Mark my day</a>
</header>

<div class="tally">
  <div class="figure">
    <strong class="big" id="cnt">–</strong>
    <span class="of" id="of">of – marked</span>
  </div>
  <div class="board-date" id="boardDate"></div>
  <button class="refresh" id="refreshBtn">Refresh</button>
  <div class="meter"><span class="bar"><i id="bar" style="width:0%"></i></span></div>
</div>

<main class="board" id="board"></main>

<script src="data.js"></script>
<script>
(function () {
  const $ = (id) => document.getElementById(id);
  const BOARD_CACHE = "snt_board_cache";
  $("boardDate").textContent = prettyDateIST();

  function esc(s) {
    return String(s == null ? "" : s).replace(/[&<>"]/g, (c) =>
      ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c])
    );
  }
  const nameCell = (n, d) =>
    `<span class="nm">${esc(n)}<span class="dv">${esc(d)}</span></span>`;

  function boxHTML(cls, style, title, count, inner) {
    return `<section class="box ${cls}"${style}>
      <header><h2>${esc(title)}</h2><span class="n">${count}</span></header>
      ${inner}</section>`;
  }

  function render(rows) {
    const marked = {};
    rows.forEach((r) => { marked[r.mrId] = r; });   // last row per MR wins

    const buckets = {};
    BOARD_ORDER.forEach((z) => (buckets[z] = []));
    const offField = [], unmarked = [];

    MRS.forEach((m) => {
      const r = marked[m.id];
      if (!r) { unmarked.push(m); return; }
      if (r.status === "WORKING") {
        // An MR can log towns across several zones in one entry.
        // Group their towns by the zone each town belongs to.
        const towns = splitList(r.city);
        const declared = splitList(r.zone);
        const byZone = {};
        towns.forEach((t) => {
          const z = CITY_TO_ZONE[t] || declared[0];
          if (z && buckets[z]) (byZone[z] = byZone[z] || []).push(t);
        });
        Object.keys(byZone).forEach((z) => {
          buckets[z].push({ mrName: r.mrName, division: r.division, towns: byZone[z] });
        });
      } else {
        offField.push(r);
      }
    });

    const total = MRS.length, done = total - unmarked.length;
    $("cnt").textContent = done;
    $("of").textContent = "of " + total + " marked";
    $("bar").style.width = (total ? (done / total) * 100 : 0) + "%";

    // --- the zones ---
    let zonesHTML = "";
    BOARD_ORDER.forEach((z) => {
      const list = buckets[z];
      const inner = list.length
        ? "<ul>" + list.map((e) =>
            `<li>${nameCell(e.mrName, e.division)}<span class="loc">${esc(e.towns.join(", "))}</span></li>`
          ).join("") + "</ul>"
        : '<p class="empty">Nobody in this zone today.</p>';
      zonesHTML += boxHTML("zone", ` style="--zc:var(${ZONE_KEY[z].var})"`, z, list.length, inner);
    });

    // --- summary row ---
    const LBL = { HQ: "Travelling to HQ", OFFICE: "SNT Office", LEAVE: "On leave" };
    const offHTML = boxHTML("offfield", "", "Not in field — declared", offField.length,
      offField.length
        ? "<ul>" + offField.map((r) =>
            `<li>${nameCell(r.mrName, r.division)}<span class="loc">${esc(LBL[r.status] || r.status)}</span></li>`
          ).join("") + "</ul>"
        : '<p class="empty">Everyone is in the field.</p>'
    );

    const unmarkedHTML = boxHTML("unmarked" + (unmarked.length ? "" : " clear"), "", "Not marked — call these", unmarked.length,
      unmarked.length
        ? "<ul>" + unmarked.map((m) => `<li>${nameCell(m.name, m.division)}</li>`).join("") + "</ul>"
        : `<p class="empty">All ${total} marked. Nothing to chase.</p>`
    );

    $("board").innerHTML =
      '<div class="zones-grid">' + zonesHTML + '</div>' +
      '<div class="divider">Summary</div>' +
      '<div class="summary-grid">' + offHTML + unmarkedHTML + '</div>';
  }

  // Paint the last board we saw the instant the page opens, so there's
  // never a blank wait while the network catches up.
  function paintFromCache() {
    try {
      const c = JSON.parse(localStorage.getItem(BOARD_CACHE) || "null");
      if (c && c.date === todayIST() && Array.isArray(c.rows)) {
        if (Array.isArray(c.mrs) && c.mrs.length) { MRS = c.mrs; MRS_SOURCE = "sheet"; }
        render(c.rows);
        return true;
      }
    } catch (e) {}
    return false;
  }

  async function load() {
    const b = $("refreshBtn");
    if (b.textContent !== "Retry") b.textContent = "Loading…";
    try {
      // One round-trip: MR list + today's rows together (backend ?board=1).
      const out = await apiFetch(API_URL + "?board=1&date=" + todayIST() + "&t=" + Date.now());
      if (!out.ok) throw new Error(out.error || "load failed");

      if (Array.isArray(out.mrs) && out.mrs.length) {
        MRS = out.mrs; MRS_SOURCE = "sheet";
        try { localStorage.setItem("snt_mrs", JSON.stringify(out.mrs)); } catch (e) {}
      } else if (MRS_SOURCE !== "sheet") {
        // Older backend that doesn't answer ?board=1 with a list — get it separately.
        await loadMaster();
      }

      const rows = out.rows || [];
      render(rows);
      try {
        localStorage.setItem(BOARD_CACHE, JSON.stringify({ date: todayIST(), rows: rows, mrs: MRS }));
      } catch (e) {}

      b.textContent = MRS_SOURCE === "sheet" ? "Refresh" : "Refresh · old list";
      b.title = MRS_SOURCE === "sheet" ? "" :
        "Could not read the Master tab — showing the built-in MR list, which may be out of date.";
    } catch (e) {
      b.textContent = "Retry";
      // Keep whatever is already on screen (cache); only show an error on a blank board.
      if (!$("board").querySelector(".zones-grid")) {
        $("board").innerHTML =
          '<div class="zones-grid"><section class="box unmarked" style="grid-column:1/-1">' +
          '<header><h2>Board did not load</h2></header>' +
          '<p class="empty">' + esc(e.message) + (e.apiConfig ? '.' : ' — press Retry.') + '</p></section></div>';
      }
    }
  }

  $("refreshBtn").addEventListener("click", load);
  paintFromCache();
  load();
  setInterval(load, 60000);
})();
</script>
</body>
</html>
